name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fotosfolio-email:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/fotosfolio-email:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/fotosfolio-email:buildcache,mode=max

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Pull the latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/fotosfolio-email:latest
            
            # Stop and remove existing container if it exists
            docker stop fotosfolio-email || true
            docker rm fotosfolio-email || true
            
            # Run the new container with env file (no port exposure)
            docker run -d \
              --name fotosfolio-email \
              --restart unless-stopped \
              --env-file /opt/email/.env \
              ${{ secrets.DOCKER_USERNAME }}/fotosfolio-email:latest
            
            # Clean up unused images
            docker image prune -f
